[general]
live_config_reload = true
import = ["themes/themes/ayu_dark.toml", "fonts.toml"]

[env]
TERM = "alacritty" # can change to "alacritty"
# WINIT_X11_SCALE_FACTOR = "1.2"

[window]
decorations = "none"
opacity = 0.9
blur = true
dynamic_title = true
dynamic_padding = false
padding = { x = 10, y = 10 }
resize_increments = true

[cursor]
blink_interval = 550
unfocused_hollow = false
thickness = 0.15

[cursor.style]
shape = "Beam"
blinking = "Off"

[selection]
save_to_clipboard = true

[scrolling]
history = 5000
multiplier = 3

[bell]
animation = "EaseOutExpo"
duration = 0
# command = { program = "paplay", args = ["/usr/share/sounds/freedesktop/stereo/dialog-error.oga"] }

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
  # Window management
  { key = "N", mods = "Control|Shift", action = "CreateNewWindow" },
  { key = "F", mods = "Control|Shift", action = "ToggleFullscreen" },
  { key = "L", mods = "Control|Shift", action = "ToggleMaximized" },

  # Tabs
  { key = "T", mods = "Control|Shift", action = "CreateNewTab" },

  # Copy / Paste
  { key = "C", mods = "Control|Shift", action = "Copy" },
  { key = "V", mods = "Control|Shift", action = "Paste" },

  # Font scaling
  { key = "Equals", mods = "Control", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Control", action = "DecreaseFontSize" },
  { key = "0", mods = "Control", action = "ResetFontSize" },

  # Search in scrollback
  { key = "F", mods = "Control", action = "SearchForward" },

  # Send Shift+Enter as escaped newline
  { key = "Return", mods = "Shift", chars = "\u001B\r" },
]
