# Enable Colours
set -g default-terminal "tmux-256color" # Set terminal type, phải match $TERM của terminal emulator
set -ga terminal-overrides ",alacritty:RGB" # Bật true color (24-bit) support cho alacritty

# Bahavior
set -s escape-time 0 # Bỏ ESC delay (mặc định 500ms), tránh lag khi nhấn ESC trong nvim
set -g focus-events on  # Cho phép nvim nhận focus/blur event (cần cho autoread, gitgutter, v.v.)
set -g mouse on # Bật chuột: click chọn pane, scroll, kéo resize
set -g history-limit 10000 # Lưu 10000 dòng scrollback buffer

# Indexing
set -g base-index 1 # Window bắt đầu từ 1 thay vì 0 (dễ nhảy bằng prefix + số)
set -g pane-base-index 1 # Pane bắt đầu từ 1, đồng nhất với window
set -g renumber-windows on # Tự đánh số lại window sau khi đóng (tránh gap: 1, 3, 4)

# Prefix Key
unbind C-b # Bỏ prefix mặc định Ctrl+b
set -g prefix C-a # Đổi prefix thành Ctrl+a
bind C-a send-prefix # Nhấn Ctrl+a hai lần để gửi Ctrl+a vào terminal

# Pane splits
unbind % # Bỏ bind mặc định split dọc
bind '\' split-window -h -c '#{pane_current_path}' # Prefix + \ để split dọc, giữ nguyên thư mục hiện tại
unbind '"' # Bỏ bind mặc định split ngang
bind - split-window -v -c '#{pane_current_path}' # Prefix + - để split ngang, giữ nguyên thư mục hiện tại

# Resize
bind -r h resize-pane -L 5 # Prefix + h để thu nhỏ pane sang trái 5 cell (giữ prefix để lặp)
bind -r j resize-pane -D 5 # Prefix + j để mở rộng pane xuống dưới 5 cell
bind -r k resize-pane -U 5 # Prefix + k để mở rộng pane lên trên 5 cell
bind -r l resize-pane -R 5 # Prefix + l để mở rộng pane sang phải 5 cell

# Resize to default
bind -r m resize-pane -Z # Prefix + m để zoom pane hiện tại (toggle fullscreen)

# Copy vim movements (vi-style)
set-window-option -g mode-keys vi # Dùng vi keybinding trong copy mode (thay vì emacs)
bind-key -T copy-mode-vi 'v' send -X begin-selection # Nhấn v để bắt đầu chọn text (như visual mode trong vim)
# Nhấn y để yank vào system clipboard rồi thoát copy mode
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'xclip -selection clipboard'
# Kéo chuột chọn text cũng tự copy vào clipboard
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'

# Reload config
unbind r # Bỏ bind mặc định của r
bind r source-file ~/.tmux.conf \; display-message "󰑓 Config reloaded!" # Prefix + r để reload tmux config không cần restart
