# Terminal
set -g default-terminal 'tmux-256color'         # $TERM mà tmux expose cho process bên trong
set -as terminal-features ',alacritty*:RGB:usstyle:sync'
set -as terminal-features ',xterm-kitty:RGB:usstyle:sync'
set -as terminal-features ',xterm*:extkeys'

# Behavior
set -s escape-time 0
set -g focus-events on                          # nvim autoread, gitsigns cần
set -g mouse on
set -g history-limit 10000
set -g set-clipboard on                         # OSC 52: copy về clipboard host kể cả qua SSH
set -g detach-on-destroy off                    # đóng window cuối → switch session khác thay vì detach
set -g extended-keys on

# Index window/pane từ 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on                      # tự dồn số sau khi đóng window

# Prefix C-a
unbind C-b
set -g prefix C-a
bind C-a send-prefix                            # bấm 2 lần để gửi literal C-a vào pane

# New window / split giữ cwd
unbind %
unbind '"'
bind c   new-window      -c '#{pane_current_path}'
bind '\' split-window -h -c '#{pane_current_path}'
bind -   split-window -v -c '#{pane_current_path}'

# Pane navigation kiểu vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R                           # đè default last-window của 'l'
bind Tab last-window                            # bù lại last-window

# Pane resize (-r: giữ prefix bấm liên tục được trong repeat-time)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind m resize-pane -Z

# Copy mode kiểu vi
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v   send -X begin-selection
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y   send -X copy-pipe-and-cancel 'xclip -selection clipboard'
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xclip -selection clipboard'

# Reload config
unbind r
bind r source-file ~/.tmux.conf \; display-message "󰑓 Config reloaded!"

# Plugins (TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'catppuccin/tmux'

# Continuum: tự save mỗi 15p. Restore thủ công bằng prefix + Ctrl-r
# set -g @continuum-restore 'on'

# Catppuccin theme
set -g @catppuccin_flavor 'mocha'               # latte | frappe | macchiato | mocha
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'

# Khởi tạo TPM — phải đứng trước phần status bar (vì status bar tham chiếu biến từ catppuccin)
run '~/.tmux/plugins/tpm/tpm'

# Status bar
set -g status-position bottom
set -g status-justify 'absolute-centre'
set -g status-left-length 100
set -g status-right-length 100
set -g status-interval 5                        # nhịp refresh cpu/ram/battery (giây)

# Workaround: tmux-battery script trên máy này trả "55%" → strip % rồi tự append lại
set -g @catppuccin_battery_text " #{l:#(~/.tmux/plugins/tmux-battery/scripts/battery_percentage.sh | tr -d %)}%"

# Date/time: thứ + ngày · đồng hồ + giờ
set -g @catppuccin_date_time_icon "󰸗 "
set -g @catppuccin_date_time_text " %a %d/%m 󰥔 %H:%M"

# status-left dùng -g (không -F): để #S và #{b:pane_current_path} resolve ở mỗi lần draw.
#   Nếu thêm -F, các placeholder bị expand & freeze ngay tại set-time → session mới sẽ
#   vẫn hiện tên/path của session cũ.
# status-right dùng -gF: cần expand ngay để #{l:#{cpu_percentage}} hoá thành literal
#   #{cpu_percentage}, để 2 dòng `run` ở cuối rewrite thành #(script.sh).
set -g  status-left  '#{E:@catppuccin_status_session}#{E:@catppuccin_status_directory}'
set -gF status-right '#{E:@catppuccin_status_cpu}#{E:@catppuccin_status_ram}#{E:@catppuccin_status_battery}#{E:@catppuccin_status_date_time}'

# Thay literal #{cpu_percentage}, #{battery_*} trong status-right bằng #(script.sh) thật
run '~/.tmux/plugins/tmux-cpu/cpu.tmux'
run '~/.tmux/plugins/tmux-battery/battery.tmux'
